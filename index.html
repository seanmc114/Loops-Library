<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loops Library — Learning Games</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="Loops_icon_192.png">
  <link rel="apple-touch-icon" href="Loops_icon_180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Loops">
  <meta name="theme-color" content="#0d2a52">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #152a63;
      --paper: #f2f4fa;
      --card: #ffffff;
      --line: #d7deee;
      --coral: #2f5aa8;
      --gold: #b8862f;
      --teal: #0d7a68;
      --muted: #4a5578;
    }

    body {
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.6;
    }

    .header { background: var(--card); border-bottom: 3px solid var(--line); padding: 30px 20px; text-align: center; }
    .logo-section { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
    .logo-img { height: 120px; width: auto; border-radius: 8px; }
    .header h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--ink); font-weight: 700; letter-spacing: -1px; }
    .header p { color: var(--muted); font-size: 1.1rem; margin-top: 8px; }

    .controls {
      background: var(--card); padding: 25px 20px; display: flex; flex-wrap: wrap;
      gap: 15px; align-items: center; justify-content: center; border-bottom: 2px solid var(--line);
    }
    .search-box { flex: 1; min-width: 250px; max-width: 400px; }
    .search-box input {
      width: 100%; padding: 12px 16px; border: 2px solid var(--line); border-radius: 8px;
      font-size: 1rem; font-family: inherit; transition: all 0.2s;
    }
    .search-box input:focus { outline: none; border-color: var(--coral); box-shadow: 0 0 0 3px rgba(47, 90, 168, 0.1); }
    .filter-group { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .filter-btn {
      padding: 10px 16px; border: 2px solid var(--line); background: var(--card); color: var(--ink);
      border-radius: 24px; cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--coral); color: var(--coral); }
    .filter-btn.active { background: var(--coral); color: white; border-color: var(--coral); }

    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    .category-section { margin-bottom: 50px; }
    .category-header { display: flex; align-items: center; gap: 12px; margin-bottom: 25px; padding-bottom: 12px; border-bottom: 3px solid var(--line); }
    .category-emoji { font-size: 2rem; }
    .category-name { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--ink); font-weight: 700; }
    .game-count { margin-left: auto; color: var(--muted); font-size: 0.95rem; font-weight: 600; }

    .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .game-tile {
      background: var(--card); border: 2px solid var(--line); border-radius: 12px; padding: 24px;
      transition: all 0.3s; display: flex; flex-direction: column; color: inherit;
    }
    .game-tile:hover { border-color: var(--coral); box-shadow: 0 8px 24px rgba(47, 90, 168, 0.15); transform: translateY(-4px); }
    .game-tile-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
    .game-emoji { font-size: 1.8rem; flex-shrink: 0; }
    .game-name { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--ink); line-height: 1.2; }
    .game-meta { display: flex; gap: 16px; color: var(--muted); font-size: 0.9rem; margin-bottom: 16px; padding-top: 12px; border-top: 1px solid var(--line); }
    .meta-item { display: flex; align-items: center; gap: 4px; }
    .game-category { display: inline-block; background: var(--paper); color: var(--coral); padding: 4px 12px; border-radius: 16px; font-size: 0.85rem; font-weight: 600; margin-top: auto; }

    .tile-actions { display: flex; gap: 10px; margin-top: 16px; align-items: center; }
    .play-btn {
      flex: 1; background: var(--coral); color: white; padding: 12px 20px; border: none; border-radius: 8px;
      font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 1rem; text-align: center;
      text-decoration: none; display: block;
    }
    .play-btn:hover { background: #1e4a8a; transform: scale(1.02); }
    .qr-toggle {
      width: 48px; height: 48px; flex-shrink: 0; border: 2px solid var(--line); border-radius: 8px;
      background: var(--card); cursor: pointer; font-size: 1.3rem; display: flex; align-items: center; justify-content: center;
    }
    .qr-toggle:hover { border-color: var(--coral); }
    .qr-panel { display: none; margin-top: 14px; text-align: center; padding-top: 14px; border-top: 1px dashed var(--line); }
    .qr-panel.open { display: block; }
    .qr-panel .qr-canvas-wrap { display: inline-block; padding: 10px; background: #fff; border-radius: 8px; }
    .qr-panel p { font-size: 0.78rem; color: var(--muted); margin-top: 8px; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state-icon { font-size: 4rem; margin-bottom: 20px; opacity: 0.5; }
    .empty-state h2 { font-size: 1.5rem; margin-bottom: 10px; color: var(--ink); }

    .footer { background: var(--card); border-top: 2px solid var(--line); padding: 30px 20px; text-align: center; color: var(--muted); font-size: 0.9rem; margin-top: 60px; }
    .footer em { font-style: italic; color: var(--ink); }
    .category-section.empty { display: none; }
    .hidden { display: none !important; }

    @media (max-width: 768px) {
      .header h1 { font-size: 1.8rem; }
      .logo-section { flex-direction: column; gap: 15px; }
      .logo-img { height: 80px; }
      .controls { flex-direction: column; }
      .search-box { max-width: 100%; }
      .filter-group { width: 100%; }
      .games-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="saveBanner" style="display:none;background:#0d2a52;color:#fff;text-align:center;padding:12px 20px;font-size:.85rem;">
    📲 Add Loops to your home screen so you never lose it — tap Share → Add to Home Screen (iPhone) or the menu → Install app (Android).
    <a href="#" onclick="dismissSaveBanner();return false;" style="color:#e8d9b5;margin-left:10px;font-weight:700;text-decoration:none;">Got it</a>
  </div>

  <div class="header">
    <div class="logo-section">
      <img src="Loops_logo.png" alt="Loops" class="logo-img">
      <div><h1>Loops</h1><p><em>Learning Tools. Dublin.</em></p><p style="font-weight:700;color:var(--coral);font-size:1.05rem;margin-top:4px;">Fail here. Shine in public.</p></div>
    </div>
    <div style="text-align:center;margin-top:16px;">
      <a href="https://seanmc114.github.io/Loops-learning/" style="display:inline-block;background:var(--coral);color:#fff;padding:10px 22px;border-radius:20px;font-weight:700;text-decoration:none;font-size:.9rem;">+ Build a game</a>
    </div>
  </div>

  <div class="controls">
    <div class="search-box"><input type="text" id="searchInput" placeholder="Search games..." onkeyup="filterGames()"></div>
    <div class="filter-group">
      <button class="filter-btn active" onclick="filterByCategory('')">All</button>
      <button class="filter-btn" onclick="filterByCategory('Language')">🌍 Language</button>
      <button class="filter-btn" onclick="filterByCategory('Onboarding')">🪪 Onboarding</button>
      <button class="filter-btn" onclick="filterByCategory('Compliance')">🛡️ Compliance</button>
      <button class="filter-btn" onclick="filterByCategory('Exam Prep')">📝 Exam Prep</button>
      <button class="filter-btn" onclick="filterByCategory('Misc')">✨ Misc</button>
    </div>
  </div>

  <div class="container" id="library"></div>

  <div class="footer"><p>© 2026 Loops Learning Tools · <em>Imagination and Perseverance</em></p>
    <p style="margin-top:8px;"><a href="#" onclick="unlockAdmin();return false;" style="color:var(--muted);font-size:.78rem;text-decoration:none;">🔑 Admin</a></p>
  </div>

  <script>
    function dismissSaveBanner() {
      document.getElementById('saveBanner').style.display = 'none';
      try { localStorage.setItem('loops_save_banner_dismissed', '1'); } catch (e) {}
    }
    (function () {
      try {
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        const dismissed = localStorage.getItem('loops_save_banner_dismissed') === '1';
        if (!isStandalone && !dismissed) {
          document.getElementById('saveBanner').style.display = 'block';
        }
      } catch (e) {}
    })();

    let allGames = [];
    const WORKER_URL = 'https://dry-credit-f396.seansynge.workers.dev';
    let adminSecret = null; // only set in-memory for this session if unlocked

    // Pick up the creator ID handoff from the builder (?me=...) the first
    // time someone arrives from there, and remember it on this origin from
    // then on — the builder and library are different domains, so
    // localStorage isn't shared between them without this bridge.
    function getMyCreatorId() {
      const params = new URLSearchParams(window.location.search);
      const fromUrl = params.get('me');
      try {
        if (fromUrl) {
          localStorage.setItem('loops_my_creator_id', fromUrl);
          const cleanUrl = window.location.pathname;
          window.history.replaceState({}, '', cleanUrl);
        }
        return localStorage.getItem('loops_my_creator_id') || null;
      } catch (e) {
        return fromUrl || null;
      }
    }
    const myCreatorId = getMyCreatorId();

    function unlockAdmin() {
      const pw = prompt('Admin password:');
      if (!pw) return;
      adminSecret = pw;
      renderLibrary();
    }

    async function deleteGame(slug) {
      const game = allGames.find(g => g.slug === slug);
      const name = game ? game.name : slug;
      if (!confirm('Delete "' + name + '" permanently? This can not be undone.')) return;
      try {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'delete', slug, creatorId: myCreatorId, adminSecret })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Delete failed');
        allGames = allGames.filter(g => g.slug !== slug);
        renderLibrary();
      } catch (err) {
        alert('Could not delete: ' + err.message);
      }
    }

    async function loadLibrary() {
      try {
        const response = await fetch('./games.json');
        const data = await response.json();
        allGames = data.games || [];
        renderLibrary();
      } catch (err) {
        console.error('Error loading library:', err);
        document.getElementById('library').innerHTML = `
          <div class="empty-state"><div class="empty-state-icon">📚</div><h2>No games yet</h2><p>Games will appear here as they're published.</p></div>`;
      }
    }

    function gameUrl(game) {
      return new URL('games/' + game.slug + '.html', window.location.href).href;
    }

    function escapeHtml(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function renderLibrary() {
      const categories = {
        'Language': { emoji: '🌍', games: [] },
        'Onboarding': { emoji: '🪪', games: [] },
        'Compliance': { emoji: '🛡️', games: [] },
        'Exam Prep': { emoji: '📝', games: [] },
        'Misc': { emoji: '✨', games: [] }
      };

      allGames.forEach(game => {
        const cat = game.category || 'Language';
        if (categories[cat]) categories[cat].games.push(game);
      });

      let html = '';
      let hasGames = false;

      for (const [catName, catData] of Object.entries(categories)) {
        if (catData.games.length === 0) continue;
        hasGames = true;

        html += `
          <div class="category-section" data-category="${catName}">
            <div class="category-header">
              <span class="category-emoji">${catData.emoji}</span>
              <h2 class="category-name">${catName}</h2>
              <span class="game-count">${catData.games.length} game${catData.games.length !== 1 ? 's' : ''}</span>
            </div>
            <div class="games-grid">`;

        catData.games.forEach(game => {
          const url = gameUrl(game);
          const canDelete = adminSecret || (myCreatorId && game.createdBy === myCreatorId);
          html += `
            <div class="game-tile" data-search="${escapeHtml(game.name.toLowerCase())}">
              <div class="game-tile-header">
                <span class="game-emoji">${game.emoji || '🎮'}</span>
                <h3 class="game-name">${escapeHtml(game.name)}</h3>
              </div>
              <div class="game-meta">
                <div class="meta-item">📊 ${game.loopCount} loop${game.loopCount !== 1 ? 's' : ''}</div>
                <div class="meta-item">❓ ${game.questionCount} q's</div>
                ${game.author ? `<div class="meta-item">✍️ by ${escapeHtml(game.author)}</div>` : ''}
              </div>
              <div class="tile-actions">
                <a href="${url}" class="play-btn">Play →</a>
                <button class="qr-toggle" onclick="toggleQR('${game.slug}')" title="Show QR code">▦</button>
                ${canDelete ? `<button class="qr-toggle" onclick="deleteGame('${game.slug}')" title="Delete this game" style="color:#c94c4c;">🗑</button>` : ''}
              </div>
              <div class="qr-panel" id="qr-panel-${game.slug}">
                <div class="qr-canvas-wrap" id="qr-canvas-${game.slug}"></div>
                <p>Scan to play on your phone</p>
              </div>
            </div>`;
        });

        html += `</div></div>`;
      }

      if (!hasGames) {
        html = `<div class="empty-state"><div class="empty-state-icon">📚</div><h2>No games yet</h2><p>Games will appear here as they're published.</p></div>`;
      }

      document.getElementById('library').innerHTML = html;
    }

    const renderedQR = new Set();
    function toggleQR(slug) {
      const panel = document.getElementById('qr-panel-' + slug);
      panel.classList.toggle('open');
      if (panel.classList.contains('open') && !renderedQR.has(slug)) {
        const game = allGames.find(g => g.slug === slug);
        if (game && window.QRCode) {
          new QRCode(document.getElementById('qr-canvas-' + slug), {
            text: gameUrl(game),
            width: 140,
            height: 140,
            colorDark: '#152a63',
            colorLight: '#ffffff'
          });
          renderedQR.add(slug);
        }
      }
    }

    function filterByCategory(cat) {
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      document.querySelectorAll('.category-section').forEach(sec => {
        sec.classList.toggle('hidden', cat && sec.dataset.category !== cat);
      });
      filterGames();
    }

    function filterGames() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      document.querySelectorAll('.game-tile').forEach(tile => {
        const matchesSearch = !search || tile.dataset.search.includes(search);
        tile.style.display = matchesSearch ? 'flex' : 'none';
      });
    }

    loadLibrary();
  </script>
</body>
</html>
