<!DOCTYPE html>
<html lang="ga">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Turbo Irish</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --forest: #0f1f0f;
    --deep: #162416;
    --card: #1d301d;
    --gold: #c9a84c;
    --gold-pale: #e8d08a;
    --cream: #f0ead6;
    --correct: #4caf6e;
    --wrong: #c94c4c;
    --text: #d4cdb8;
    --muted: #7a7560;
    --timer-full: #c9a84c;
    --timer-low: #c94c4c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--forest);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 0;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    width: 100%;
    background: var(--deep);
    border-bottom: 1px solid #2a3d2a;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    font-weight: 900;
    letter-spacing: 0.08em;
  }
  .logo span:first-child { color: #4a9eff; }
  .logo span:last-child { color: var(--wrong); }
  .logo-divider { color: var(--gold); margin: 0 2px; font-size: 1rem; }

  .level-pills {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .pill {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #2a3d2a;
    border: 1px solid #3a4f3a;
    font-size: 0.55rem;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    transition: all 0.3s;
  }
  .pill.done { background: var(--gold); border-color: var(--gold); color: var(--forest); }
  .pill.active { background: var(--card); border-color: var(--gold); color: var(--gold); }

  /* SCREENS */
  .screen { display: none; width: 100%; max-width: 480px; padding: 24px 16px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* HOME */
  .home-hero {
    text-align: center;
    padding: 32px 0 24px;
  }
  .fada-hero {
    font-family: 'Cinzel', serif;
    font-size: 5rem;
    color: var(--gold);
    line-height: 1;
    text-shadow: 0 0 40px rgba(201,168,76,0.3);
    margin-bottom: 8px;
  }
  .home-title {
    font-family: 'Cinzel', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--cream);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .home-sub {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .level-grid {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }
  .level-btn {
    background: var(--card);
    border: 1px solid #2a3d2a;
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    width: 100%;
  }
  .level-btn:hover, .level-btn:active { border-color: var(--gold); background: #253525; }
  .level-btn.locked { opacity: 0.4; cursor: not-allowed; }
  .level-btn.completed { border-color: var(--gold); }
  .level-num {
    font-family: 'Cinzel', serif;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--gold);
    min-width: 32px;
  }
  .level-info { flex: 1; }
  .level-name { font-size: 0.95rem; font-weight: 600; color: var(--cream); }
  .level-desc { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .level-badge {
    font-size: 1.1rem;
  }
  .level-stars { font-size: 0.75rem; color: var(--gold); letter-spacing: -1px; }

  /* ROUND HEADER */
  .round-header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .round-level-name {
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    color: var(--gold);
    letter-spacing: 0.1em;
  }
  .round-score {
    font-size: 0.85rem;
    color: var(--muted);
  }
  .round-score span { color: var(--cream); font-weight: 600; }

  /* TIMER BAR */
  .timer-wrap {
    width: 100%;
    height: 4px;
    background: #2a3d2a;
    border-radius: 2px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .timer-bar {
    height: 100%;
    background: var(--gold);
    border-radius: 2px;
    transition: width 0.1s linear, background 0.5s;
  }

  /* QUESTION CARD */
  .q-card {
    width: 100%;
    background: var(--card);
    border: 1px solid #2a3d2a;
    border-radius: 14px;
    padding: 24px 20px;
    margin-bottom: 16px;
    text-align: center;
  }
  .q-progress {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .q-type-badge {
    display: inline-block;
    font-size: 0.65rem;
    color: var(--gold);
    border: 1px solid var(--gold);
    border-radius: 4px;
    padding: 2px 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .q-text {
    font-size: 1.35rem;
    font-weight: 500;
    color: var(--cream);
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .q-phonetic {
    font-size: 0.75rem;
    color: var(--muted);
    font-style: italic;
  }

  /* MULTIPLE CHOICE */
  .mc-options {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }
  .mc-btn {
    background: var(--card);
    border: 1px solid #2a3d2a;
    border-radius: 10px;
    padding: 14px 16px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .mc-btn:hover:not(.revealed) { border-color: var(--gold); background: #253525; }
  .mc-btn .mc-irish { font-size: 1rem; font-weight: 500; color: var(--cream); }
  .mc-btn .mc-phonetic { font-size: 0.7rem; color: var(--muted); font-style: italic; }
  .mc-btn.correct { border-color: var(--correct); background: rgba(76,175,110,0.12); }
  .mc-btn.wrong { border-color: var(--wrong); background: rgba(201,76,76,0.12); }
  .mc-btn.correct .mc-irish { color: var(--correct); }
  .mc-btn.wrong .mc-irish { color: var(--wrong); }

  /* TYPED INPUT */
  .typed-wrap {
    width: 100%;
    margin-bottom: 12px;
  }
  .typed-input {
    width: 100%;
    background: var(--card);
    border: 1px solid #2a3d2a;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 1.1rem;
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .typed-input:focus { border-color: var(--gold); }
  .typed-input.correct { border-color: var(--correct); background: rgba(76,175,110,0.08); }
  .typed-input.wrong { border-color: var(--wrong); background: rgba(201,76,76,0.08); }

  .fada-hint {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    margin-bottom: 12px;
  }
  .fada-hint strong { color: var(--gold); }

  .submit-btn {
    width: 100%;
    background: var(--gold);
    color: var(--forest);
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s;
    margin-bottom: 12px;
  }
  .submit-btn:active { opacity: 0.8; }

  /* FEEDBACK */
  .feedback {
    width: 100%;
    background: var(--card);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 12px;
    display: none;
    flex-direction: column;
    gap: 6px;
  }
  .feedback.show { display: flex; }
  .feedback-result {
    font-size: 1rem;
    font-weight: 600;
  }
  .feedback-result.correct { color: var(--correct); }
  .feedback-result.wrong { color: var(--wrong); }
  .feedback-correct-answer {
    font-size: 0.85rem;
    color: var(--cream);
  }
  .feedback-phonetic {
    font-size: 0.75rem;
    color: var(--muted);
    font-style: italic;
  }
  .feedback-stars {
    font-size: 1.2rem;
    letter-spacing: 2px;
  }
  .feedback-bonus {
    font-size: 0.7rem;
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .next-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    border-radius: 10px;
    padding: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .next-btn:hover, .next-btn:active { background: var(--gold); color: var(--forest); }

  /* RESULTS */
  .results-card {
    width: 100%;
    background: var(--card);
    border: 1px solid #2a3d2a;
    border-radius: 14px;
    padding: 32px 24px;
    text-align: center;
    margin-bottom: 20px;
  }
  .results-score-big {
    font-family: 'Cinzel', serif;
    font-size: 4rem;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 4px;
  }
  .results-label {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .results-stars-display {
    font-size: 2rem;
    letter-spacing: 4px;
    margin-bottom: 12px;
  }
  .results-breakdown {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.8;
  }
  .results-breakdown strong { color: var(--cream); }
  .results-verdict {
    font-size: 1rem;
    color: var(--cream);
    font-weight: 500;
    margin-bottom: 8px;
  }
  .results-irish {
    font-size: 0.85rem;
    color: var(--gold);
    font-style: italic;
    margin-bottom: 24px;
  }

  .btn-primary {
    width: 100%;
    background: var(--gold);
    color: var(--forest);
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    margin-bottom: 10px;
    transition: opacity 0.2s;
  }
  .btn-primary:active { opacity: 0.8; }
  .btn-secondary {
    width: 100%;
    background: transparent;
    border: 1px solid #3a4f3a;
    color: var(--muted);
    border-radius: 10px;
    padding: 12px;
    font-size: 0.9rem;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--muted); color: var(--text); }

  .pass-threshold {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    margin-top: 10px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <span>TURBO</span><span class="logo-divider">✦</span><span>IRISH</span>
  </div>
  <div class="level-pills" id="levelPills"></div>
</div>

<!-- HOME SCREEN -->
<div class="screen active" id="homeScreen">
  <div class="home-hero">
    <div class="fada-hero">á</div>
    <div class="home-title">TURBO IRISH</div>
    <div class="home-sub">Caighdeán Oifigiúil · 8 Leibhéal</div>
  </div>
  <div class="level-grid" id="levelGrid"></div>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="gameScreen">
  <div class="round-header">
    <div class="round-level-name" id="roundLevelName"></div>
    <div class="round-score">★ <span id="roundStarCount">0</span></div>
  </div>
  <div class="timer-wrap"><div class="timer-bar" id="timerBar"></div></div>

  <div class="q-card">
    <div class="q-progress" id="qProgress">1 / 10</div>
    <div class="q-type-badge" id="qTypeBadge">Translate</div>
    <div class="q-text" id="qText"></div>
    <div class="q-phonetic" id="qPhonetic"></div>
  </div>

  <!-- Multiple choice -->
  <div class="mc-options" id="mcOptions"></div>

  <!-- Typed -->
  <div class="typed-wrap" id="typedWrap" style="display:none">
    <input class="typed-input" id="typedInput" type="text" placeholder="Scríobh anseo…" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="fada-hint" id="fadaHint" style="display:none">
    Fadas optional — but <strong>★★★</strong> if you nail them
  </div>
  <button class="submit-btn" id="submitBtn" style="display:none" onclick="submitTyped()">Seol →</button>

  <div class="feedback" id="feedback">
    <div class="feedback-result" id="feedbackResult"></div>
    <div class="feedback-correct-answer" id="feedbackAnswer"></div>
    <div class="feedback-phonetic" id="feedbackPhonetic"></div>
    <div class="feedback-stars" id="feedbackStars"></div>
    <div class="feedback-bonus" id="feedbackBonus"></div>
  </div>

  <button class="next-btn" id="nextBtn" style="display:none" onclick="nextQuestion()">
    Ar aghaidh →
  </button>
</div>

<!-- RESULTS SCREEN -->
<div class="screen" id="resultsScreen">
  <div class="results-card">
    <div class="results-score-big" id="resultsScore"></div>
    <div class="results-label">as 10</div>
    <div class="results-stars-display" id="resultsStars"></div>
    <div class="results-breakdown" id="resultsBreakdown"></div>
    <div class="results-verdict" id="resultsVerdict"></div>
    <div class="results-irish" id="resultsIrish"></div>
  </div>
  <button class="btn-primary" id="resultsNextBtn" onclick="goResultsNext()"></button>
  <button class="btn-secondary" onclick="goHome()">← Ar ais</button>
  <div class="pass-threshold">7/10 needed to unlock next level</div>
</div>

      { q:"What does 'Caithfidh mé é a dhéanamh' mean?", a:"I must do it", ph:"Kah-hee may ay uh yay-nuh", alt:["i must do it"] },
      { q:"What does the phrase 'Ní neart go cur le chéile' mean?", a:"There is no strength without unity / strength in numbers", ph:"Nee nyart guh kur le khay-leh", alt:["there is no strength without unity","strength in numbers","unity is strength"] },
      { q:"Translate: 'Languages should be valued'", a:"Ba chóir meas a bheith ar theangacha", ph:"Buh khore mass uh veh er hang-ukha", alt:["ba choir meas a bheith ar theangacha"] },
      { q:"What does 'Is fearr Gaeilge bhriste ná Béarla cliste' mean?", a:"Broken Irish is better than clever English", ph:"Iss far Gway-el-ga vrish-teh naw Bayr-luh klish-teh", alt:["broken irish is better than clever english"] },
    ]
  }
];

// ============================================================
// STATE
// ============================================================
let state = {
  progress: JSON.parse(localStorage.getItem('turboIrish_progress') || '{}'),
  // progress[levelId] = { stars: N, bestScore: N }
  currentLevel: null,
  queue: [],
  qIndex: 0,
  answered: false,
  score: 0,
  totalStars: 0,
  timer: null,
  timeLeft: 0,
  TIME_LIMIT: 20,
};

// ============================================================
// INIT
// ============================================================
function init() {
  buildPills();
  buildLevelGrid();
  showScreen('homeScreen');
}

function buildPills() {
  const container = document.getElementById('levelPills');
  container.innerHTML = '';
  LEVELS.forEach(lv => {
    const pill = document.createElement('div');
    pill.className = 'pill' + (state.progress[lv.id] ? ' done' : '');
    pill.textContent = lv.id;
    pill.id = `pill_${lv.id}`;
    container.appendChild(pill);
  });
}

function buildLevelGrid() {
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  LEVELS.forEach((lv, idx) => {
    const prog = state.progress[lv.id];
    const unlocked = idx === 0 || state.progress[LEVELS[idx-1].id];
    const btn = document.createElement('button');
    btn.className = 'level-btn' + (!unlocked ? ' locked' : '') + (prog ? ' completed' : '');
    btn.onclick = () => { if (unlocked) startLevel(lv.id); };

    const stars = prog ? renderStars(prog.stars || 0, prog.bestScore || 0) : '';
    btn.innerHTML = `
      <div class="level-num">${lv.id}</div>
      <div class="level-info">
        <div class="level-name">${lv.name}</div>
        <div class="level-desc">${lv.desc}</div>
        ${stars ? `<div class="level-stars">${stars}</div>` : ''}
      </div>
      <div class="level-badge">${!unlocked ? '🔒' : prog ? '✓' : lv.emoji}</div>
    `;
    grid.appendChild(btn);
  });
}

function renderStars(stars, score) {
  const filled = Math.round(stars / (score || 1) * 3);
  return '★'.repeat(Math.min(filled,3)) + '☆'.repeat(Math.max(0,3-filled));
}

// ============================================================
// LEVEL START
// ============================================================
function startLevel(levelId) {
  const lv = LEVELS.find(l => l.id === levelId);
  state.currentLevel = lv;
  state.queue = shuffle([...lv.questions]).slice(0, 10);
  state.qIndex = 0;
  state.score = 0;
  state.totalStars = 0;
  state.answered = false;

  document.getElementById('roundLevelName').textContent = `${lv.id}. ${lv.name}`;
  document.getElementById('roundStarCount').textContent = '0';

  showScreen('gameScreen');
  renderQuestion();
}

// ============================================================
// QUESTION RENDER
// ============================================================
function renderQuestion() {
  const lv = state.currentLevel;
  const q = state.queue[state.qIndex];
  state.answered = false;

  document.getElementById('qProgress').textContent = `${state.qIndex + 1} / 10`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('qPhonetic').textContent = q.ph ? `/${q.ph}/` : '';
  document.getElementById('qTypeBadge').textContent = lv.mode === 'mc' ? 'Roghnaigh' : 'Aistrigh';

  // Hide feedback & next
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  document.getElementById('nextBtn').style.display = 'none';

  const mcDiv = document.getElementById('mcOptions');
  const typedWrap = document.getElementById('typedWrap');
  const fadaHint = document.getElementById('fadaHint');
  const submitBtn = document.getElementById('submitBtn');

  if (lv.mode === 'mc') {
    mcDiv.style.display = 'flex';
    typedWrap.style.display = 'none';
    fadaHint.style.display = 'none';
    submitBtn.style.display = 'none';
    renderMC(q);
  } else {
    mcDiv.style.display = 'none';
    typedWrap.style.display = 'block';
    fadaHint.style.display = 'block';
    submitBtn.style.display = 'block';
    const inp = document.getElementById('typedInput');
    inp.value = '';
    inp.className = 'typed-input';
    inp.disabled = false;
    inp.focus();
  }

  startTimer();
}

function renderMC(q) {
  const container = document.getElementById('mcOptions');
  container.innerHTML = '';
  const opts = shuffle([...q.opts]);
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'mc-btn';
    // Find phonetic for this option
    const ph = opt === q.a ? q.ph : '';
    btn.innerHTML = `<span class="mc-irish">${opt}</span>${ph ? `<span class="mc-phonetic">/${ph}/</span>` : ''}`;
    btn.onclick = () => { if (!state.answered) selectMC(opt, q); };
    container.appendChild(btn);
  });
}

// ============================================================
// TIMER
// ============================================================
function startTimer() {
  clearInterval(state.timer);
  state.timeLeft = state.TIME_LIMIT;
  updateTimerBar();
  state.timer = setInterval(() => {
    state.timeLeft -= 0.1;
    updateTimerBar();
    if (state.timeLeft <= 0) {
      clearInterval(state.timer);
      timeUp();
    }
  }, 100);
}

function updateTimerBar() {
  const pct = Math.max(0, (state.timeLeft / state.TIME_LIMIT) * 100);
  const bar = document.getElementById('timerBar');
  bar.style.width = pct + '%';
  bar.style.background = pct < 30 ? 'var(--timer-low)' : 'var(--gold)';
}

function timeUp() {
  if (state.answered) return;
  state.answered = true;
  const q = state.queue[state.qIndex];
  // Mark all MC buttons as revealed, highlight correct
  const mcBtns = document.querySelectorAll('.mc-btn');
  mcBtns.forEach(btn => {
    btn.classList.add('revealed');
    if (btn.querySelector('.mc-irish').textContent === q.a) {
      btn.classList.add('correct');
    }
  });
  showFeedback(false, q, false, false);
}

// ============================================================
// ANSWER HANDLING
// ============================================================
function selectMC(chosen, q) {
  if (state.answered) return;
  state.answered = true;
  clearInterval(state.timer);

  const isCorrect = chosen === q.a;
  const mcBtns = document.querySelectorAll('.mc-btn');
  mcBtns.forEach(btn => {
    btn.classList.add('revealed');
    const text = btn.querySelector('.mc-irish').textContent;
    if (text === q.a) btn.classList.add('correct');
    else if (text === chosen && !isCorrect) btn.classList.add('wrong');
  });

  // MC: no fada bonus (no typing), just correct/wrong
  if (isCorrect) {
    state.score++;
    state.totalStars += 2; // MC gets 2 stars max (no fada opportunity)
  }
  updateStarDisplay();
  showFeedback(isCorrect, q, false, false);
}

function submitTyped() {
  if (state.answered) return;
  const inp = document.getElementById('typedInput');
  const raw = inp.value.trim();
  if (!raw) return;

  state.answered = true;
  clearInterval(state.timer);

  const q = state.queue[state.qIndex];
  const normalised = normalise(raw);
  const correctNorm = normalise(q.a);
  const alts = (q.alt || []).map(normalise);

  const exactFada = raw.toLowerCase() === q.a.toLowerCase();
  const isCorrect = normalised === correctNorm || alts.includes(normalised) || fuzzy(normalised, correctNorm);

  inp.className = 'typed-input ' + (isCorrect ? 'correct' : 'wrong');
  inp.disabled = true;

  if (isCorrect) {
    state.score++;
    const stars = exactFada ? 3 : 2;
    state.totalStars += stars;
    updateStarDisplay();
    showFeedback(true, q, exactFada, stars);
  } else {
    showFeedback(false, q, false, 0);
  }
}

// ============================================================
// NORMALISE & FUZZY
// ============================================================
function normalise(str) {
  return str.toLowerCase()
    .replace(/á/g,'a').replace(/é/g,'e').replace(/í/g,'i').replace(/ó/g,'o').replace(/ú/g,'u')
    .replace(/[^a-z0-9\s']/g,'')
    .replace(/\s+/g,' ').trim();
}

function fuzzy(a, b) {
  if (Math.abs(a.length - b.length) > 3) return false;
  let diff = 0;
  const len = Math.max(a.length, b.length);
  for (let i = 0; i < len; i++) {
    if (a[i] !== b[i]) diff++;
    if (diff > 2) return false;
  }
  return true;
}

// ============================================================
// FEEDBACK
// ============================================================
function showFeedback(isCorrect, q, exactFada, stars) {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show';

  const resultEl = document.getElementById('feedbackResult');
  const answerEl = document.getElementById('feedbackAnswer');
  const phoneticEl = document.getElementById('feedbackPhonetic');
  const starsEl = document.getElementById('feedbackStars');
  const bonusEl = document.getElementById('feedbackBonus');

  if (isCorrect) {
    resultEl.className = 'feedback-result correct';
    resultEl.textContent = exactFada ? 'Togha! Fada agus uile! 🌟' : 'Ceart! ✓';
    answerEl.textContent = q.a;
    phoneticEl.textContent = q.ph ? `/${q.ph}/` : '';
    if (stars === 3) {
      starsEl.textContent = '★★★';
      bonusEl.textContent = 'FADA BONUS';
    } else if (stars === 2) {
      starsEl.textContent = '★★';
      bonusEl.textContent = '';
    } else {
      starsEl.textContent = '★';
      bonusEl.textContent = '';
    }
  } else {
    resultEl.className = 'feedback-result wrong';
    resultEl.textContent = 'Mícheart ✗';
    answerEl.textContent = `Freagra: ${q.a}`;
    phoneticEl.textContent = q.ph ? `/${q.ph}/` : '';
    starsEl.textContent = '';
    bonusEl.textContent = '';
  }

  document.getElementById('nextBtn').style.display = 'block';
  document.getElementById('submitBtn').style.display = 'none';
}

function updateStarDisplay() {
  document.getElementById('roundStarCount').textContent = state.totalStars;
}

// ============================================================
// NEXT
// ============================================================
function nextQuestion() {
  state.qIndex++;
  if (state.qIndex >= 10) {
    endRound();
  } else {
    renderQuestion();
  }
}

// ============================================================
// RESULTS
// ============================================================
function endRound() {
  clearInterval(state.timer);
  const lv = state.currentLevel;
  const score = state.score;
  const stars = state.totalStars;
  const passed = score >= 7;

  // Save progress
  const prev = state.progress[lv.id] || {};
  const newProg = {
    bestScore: Math.max(prev.bestScore || 0, score),
    stars: Math.max(prev.stars || 0, stars),
    passed: prev.passed || passed,
  };
  state.progress[lv.id] = newProg;
  localStorage.setItem('turboIrish_progress', JSON.stringify(state.progress));

  // Update pills & grid
  buildPills();
  buildLevelGrid();

  // Results screen
  document.getElementById('resultsScore').textContent = `${score}/10`;
  document.getElementById('resultsStars').textContent = '★'.repeat(Math.min(stars, 10));

  const mc = lv.mode === 'mc';
  const maxStars = mc ? 20 : 30;
  document.getElementById('resultsBreakdown').innerHTML =
    `<strong>${score}</strong> correct &nbsp;·&nbsp; <strong>${stars}</strong> stars of ${maxStars}`;

  // Verdict
  let verdict, irish;
  if (score === 10) {
    verdict = "Perfect. Ná stop anois.";
    irish = "Mol an óige agus tiocfaidh sí.";
  } else if (score >= 8) {
    verdict = "Very strong. Keep going.";
    irish = "Beagán eile agus beidh tú ann.";
  } else if (score >= 7) {
    verdict = "Passed. Next level unlocked.";
    irish = "Ar aghaidh leat!";
  } else if (score >= 5) {
    verdict = "Nearly there. Try again.";
    irish = "Ní neart go cur le chéile.";
  } else {
    verdict = "This one needs more work.";
    irish = "Is fearr Gaeilge bhriste ná Béarla cliste.";
  }

  document.getElementById('resultsVerdict').textContent = verdict;
  document.getElementById('resultsIrish').textContent = irish;

  const nextBtn = document.getElementById('resultsNextBtn');
  const nextLv = LEVELS.find(l => l.id === lv.id + 1);
  if (passed && nextLv) {
    nextBtn.textContent = `Ar aghaidh → Leibhéal ${nextLv.id}: ${nextLv.name}`;
    nextBtn.onclick = () => startLevel(nextLv.id);
  } else {
    nextBtn.textContent = 'Arís →';
    nextBtn.onclick = () => startLevel(lv.id);
  }

  showScreen('resultsScreen');
}

function goResultsNext() {} // handled dynamically above

function goHome() {
  clearInterval(state.timer);
  showScreen('homeScreen');
  buildLevelGrid();
}

// ============================================================
// UTILS
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Enter key on typed input
document.getElementById('typedInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitTyped();
});

// ============================================================
// GO
// ============================================================
init();
</script>
